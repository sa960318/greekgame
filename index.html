<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GREEK DAY'S TOPPING</title>
    <style>
        body { margin: 0; background: #f0faff; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 90%; max-width: 440px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; color: #1a73e8; z-index: 10; pointer-events: none; }
        canvas { background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-radius: 25px; max-width: 95%; height: auto; touch-action: none; }
        #startBtn { position: absolute; padding: 20px 40px; font-size: 24px; background: #1a73e8; color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 11; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #resultOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; color: white; flex-direction: column; text-align: center; }
        .result-box { background: white; padding: 30px; border-radius: 30px; color: #333; width: 80%; max-width: 300px; }
        .retry-btn { margin-top: 20px; padding: 12px 25px; font-size: 18px; background: #1a73e8; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        @keyframes shake { 0% { transform: translate(3px, 2px); } 50% { transform: translate(-3px, -2px); } 100% { transform: translate(0, 0); } }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="lives">Life: 🥣🥣🥣</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <button id="startBtn">GREEK START!</button>
    <div id="resultOverlay">
        <div class="result-box">
            <h1 style="margin:0; color:#ff4081; font-size: 24px;">GAME OVER</h1>
            <p id="finalScoreText" style="font-size:28px; font-weight:bold; margin: 15px 0;"></p>
            <p id="rankText" style="font-size:18px; color:#555;"></p>
            <button class="retry-btn" onclick="location.reload()">다시 하기</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const startBtn = document.getElementById('startBtn');
    const resultOverlay = document.getElementById('resultOverlay');
    
    // 게임 해상도 고정
    canvas.width = 480;
    canvas.height = 720;

    // --- 리소스 설정 ---
    const bgm = new Audio('bgm.mp3'); 
    bgm.loop = true;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const playerImg = new Image();
    playerImg.src = '그릭데이_그릭요거트시그니처450g-2.jpg'; 
    let isImgLoaded = false;
    playerImg.onload = () => { isImgLoaded = true; };

    const bigObstacleImg = new Image();
    bigObstacleImg.src = 'big_obstacle.png';

    // --- 게임 상태 변수 ---
    let isPlaying = false;
    let score = 0;
    let lives = 3;
    let gameSpeed = 1.0;
    let frameCount = 0;
    let superModeTimer = 0;
    const player = { x: 165, y: 530, baseSize: 150, currentSize: 150 };
    const items = [];
    const dynamicTexts = [];
    const toppings = ['🍓', '🍯', '🥣', '🫐', '🍌'];
    const traps = ['🥒', '🍶', '🍜'];
    const superFood = '🌈';

    // --- 사운드 함수 ---
    function playSound(freq, duration = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function addDynamicText(x, y, text, color) {
        dynamicTexts.push({ x, y, text, color, alpha: 1 });
    }

    function showResult() {
        isPlaying = false;
        bgm.pause();
        bgm.currentTime = 0;
        document.getElementById('finalScoreText').innerText = `${score}점`;
        let rank = score >= 1500 ? "🥇 전설의 꾸덕마스터" : score >= 800 ? "🥈 제법 찰진 그릭러버" : "🥉 그냥 묽은 우유";
        document.getElementById('rankText').innerText = rank;
        resultOverlay.style.display = 'flex';
    }

    function createItem() {
        if (Math.random() < 0.03 * Math.min(gameSpeed, 2.5)) {
            const x = Math.random() * (canvas.width - 50);
            const rand = Math.random();

            if (rand < 0.01) { // 대형 장애물
                items.push({ x: Math.random()*(canvas.width-120), y: -150, type: 'BIG_TRAP', isTrap: true, size: 120 });
                return;
            }

            let type, isSuper = false, isTrap = false;
            if (rand < 0.02) { type = superFood; isSuper = true; }
            else if (rand > 0.85) { type = traps[Math.floor(Math.random() * traps.length)]; isTrap = true; }
            else { type = toppings[Math.floor(Math.random() * toppings.length)]; }
            items.push({ x, y: -50, type, isSuper, isTrap, size: isSuper ? 55 : 40 });
        }
    }

    // --- 조작 로직 (마우스 & 터치 통합) ---
    function handleMove(clientX) {
        if (!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width; // 실제 캔버스 크기와 화면 표시 크기 비율 계산
        let targetX = (clientX - rect.left) * scaleX - player.currentSize / 2;
        player.x = Math.max(0, Math.min(canvas.width - player.currentSize, targetX));
    }

    window.addEventListener('mousemove', (e) => handleMove(e.clientX));
    window.addEventListener('touchmove', (e) => {
        handleMove(e.touches[0].clientX);
        e.preventDefault(); // 스크롤 방지
    }, { passive: false });
    window.addEventListener('touchstart', (e) => {
        handleMove(e.touches[0].clientX);
    }, { passive: false });

    function update() {
